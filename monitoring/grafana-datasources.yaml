apiVersion: 1

datasources:
  - name: Loki
    type: loki
    access: proxy
    url: http://loki:3100
    uid: Loki
    isDefault: true
    jsonData:
      derivedFields: []

  - name: QuestDB
    type: postgres
    uid: QuestDB
    url: questdb:8812
    user: admin
    secureJsonData:
      password: quest
    jsonData:
      database: qdb
      sslmode: disable
      postgresVersion: 1200
      timescaledb: false
