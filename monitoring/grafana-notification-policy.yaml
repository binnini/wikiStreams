apiVersion: 1

policies:
  - orgId: 1
    receiver: Slack
    group_by: ["alertname", "sli", "severity"]
    group_wait: 30s
    group_interval: 5m
    repeat_interval: 4h
    routes:
      - receiver: Slack
        matchers:
          - severity = critical
        group_wait: 10s
        repeat_interval: 1h
