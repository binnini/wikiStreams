apiVersion: 1

contactPoints:
  - orgId: 1
    name: Discord
    receivers:
      - uid: discord-wikistreams
        type: discord
        settings:
          url: ${DISCORD_WEBHOOK_URL}
          title: |
            [WikiStreams Alert] {{ .GroupLabels.alertname }}
          message: |
            **상태**: {{ .Status | toUpper }}
            **SLI**: {{ .GroupLabels.sli }}
            **심각도**: {{ .GroupLabels.severity }}
            {{ range .Alerts }}
            {{ .Annotations.description }}
            {{ end }}
        disableResolveMessage: false
