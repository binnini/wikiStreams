apiVersion: 1

contactPoints:
  - orgId: 1
    name: Slack
    receivers:
      - uid: slack-wikistreams
        type: slack
        settings:
          url: ${SLACK_ALERT_WEBHOOK_URL}
          recipient: ${SLACK_ALERT_CHANNEL}
          title: |
            [WikiStreams Alert] {{ .GroupLabels.alertname }}
          text: |
            *상태*: {{ .Status | toUpper }}
            *SLI*: {{ .GroupLabels.sli }}
            *심각도*: {{ .GroupLabels.severity }}
            {{ range .Alerts }}
            {{ .Annotations.description }}
            {{ end }}
        disableResolveMessage: false
