name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  unit-tests:
    name: Lint & Unit Tests
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
        cache: 'pip'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r src/producer/requirements.txt
        pip install -r src/reporter/requirements.txt
        pip install -r src/resource_monitor/requirements.txt
        pip install -r requirements-dev.txt

    - name: Lint with flake8
      run: |
        flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics

    - name: Check formatting with black
      run: |
        black . --check

    - name: Run unit tests
      run: |
        PYTHONPATH=src pytest tests/unit/

  integration-tests:
    name: Integration & E2E Tests
    runs-on: ubuntu-latest
    needs: unit-tests
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
        cache: 'pip'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r src/producer/requirements.txt
        pip install -r src/reporter/requirements.txt
        pip install -r src/resource_monitor/requirements.txt
        pip install -r requirements-dev.txt

    - name: Start services (Kafka, ClickHouse)
      run: |
        docker compose up -d
        echo "Waiting for services to start..."
        sleep 60

    - name: Run integration & E2E tests
      run: |
        PYTHONPATH=src pytest tests/integration/
