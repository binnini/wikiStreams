volumes:
  producer_cache: {}
  grafana_data: {}
  questdb_data: {}
  resource_monitor_data: {}
  minio_data: {}

services:
  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    ports:
      - "3000:3000"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana-datasources.yaml:/etc/grafana/provisioning/datasources/datasources.yaml
      - ./monitoring/grafana-dashboards.yaml:/etc/grafana/provisioning/dashboards/dashboards.yaml
      - ./monitoring/grafana-contact-points.yaml:/etc/grafana/provisioning/alerting/contact-points.yaml
      - ./monitoring/grafana-notification-policy.yaml:/etc/grafana/provisioning/alerting/notification-policy.yaml
      - ./monitoring/grafana-alert-rules.yaml:/etc/grafana/provisioning/alerting/alert-rules.yaml
      - ./monitoring/dashboards:/var/lib/grafana/dashboards
    environment:
      - GF_AUTH_ANONYMOUS_ENABLED=true
      - GF_AUTH_ANONYMOUS_ORG_ROLE=Admin
      - SLACK_ALERT_WEBHOOK_URL=${SLACK_ALERT_WEBHOOK_URL}
      - SLACK_ALERT_CHANNEL=${SLACK_ALERT_CHANNEL}
    restart: always

  questdb:
    image: questdb/questdb:9.3.3
    container_name: questdb
    ports:
      - "9000:9000"   # REST API + Web Console
      - "8812:8812"   # PostgreSQL wire protocol (Grafana 연결)
    volumes:
      - questdb_data:/var/lib/questdb
    environment:
      QDB_CAIRO_MAX_UNCOMMITTED_ROWS: "1000"
      QDB_LINE_TCP_MAINTENANCE_JOB_INTERVAL: "5000"
    mem_limit: 1100m
    restart: always

  questdb-consumer:
    build: ./src/questdb_consumer
    container_name: questdb-consumer
    depends_on:
      - questdb
      - redpanda
    restart: on-failure
    environment:
      KAFKA_BROKER: "redpanda:9092"
      KAFKA_TOPIC: "wikimedia.recentchange"
      KAFKA_GROUP_ID: "questdb-consumer"
      QUESTDB_HOST: "questdb"
      QUESTDB_ILP_PORT: "9009"
      BATCH_SIZE: "500"
      BATCH_TIMEOUT_MS: "5000"
      LOG_LEVEL: "INFO"

  redpanda:
    image: redpandadata/redpanda:latest
    container_name: redpanda
    command:
      - redpanda
      - start
      - --kafka-addr internal://0.0.0.0:9092,external://0.0.0.0:19092
      - --advertise-kafka-addr internal://redpanda:9092,external://localhost:9092
      - --mode dev-container
      - --smp 1
      - --memory 512M
    ports:
      - "9092:19092"  # host:9092 → container external listener :19092
    restart: always

  producer:
    build: ./src/producer
    container_name: producer
    volumes:
      - producer_cache:/cache
    depends_on:
      - redpanda
    restart: on-failure
    environment:
      KAFKA_BROKER: 'redpanda:9092'
      KAFKA_TOPIC: 'wikimedia.recentchange'
      KAFKA_DLQ_TOPIC: 'wikimedia.recentchange.dlq'
      QUESTDB_HOST: 'questdb'
      QUESTDB_REST_PORT: '9000'

  # dlq-consumer: 1단계 경량화 — 제거 (2026-03-07 스테이징 검증, 2026-03-08 운영 반영)
  # 제거 근거: _should_skip() 사전 필터로 log/canary 이벤트 드롭 → DLQ near-zero 확인

  resource-monitor:
    build: ./src/resource_monitor
    container_name: resource-monitor
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - resource_monitor_data:/data
    environment:
      MONITOR_TARGETS: 'producer,questdb,redpanda,questdb-consumer,reporter'
      SLACK_ALERT_WEBHOOK_URL: '${SLACK_ALERT_WEBHOOK_URL}'
      BASELINE_DB_PATH: '/data/resource_monitor_baseline.db'
    restart: always

  reporter:
    build: ./src/reporter
    container_name: reporter
    depends_on:
      - questdb
    restart: always
    environment:
      QUESTDB_HOST: 'questdb'
      QUESTDB_PORT: '9000'
      ANTHROPIC_API_KEY: '${ANTHROPIC_API_KEY}'
      SLACK_WEBHOOK_URL: '${SLACK_WEBHOOK_URL}'
      REPORT_HOUR_KST: '9'
      REPORT_STORAGE_DIR: '/app/reports'
    volumes:
      - ./reports:/app/reports

  # S3 Datalake Exporter — 기본 스택과 분리 (profiles: s3)
  # EC2(prod): docker compose --profile s3 up -d s3-exporter  → 실제 AWS S3
  # 로컬(dev):  docker compose --profile s3 up -d             → MinIO + s3-exporter
  # 백필:       docker exec -e EXPORT_DATE=2026-03-01 s3-exporter python main.py --once
  s3-exporter:
    build: ./src/s3_exporter
    container_name: s3-exporter
    depends_on:
      - questdb
    restart: always
    environment:
      QUESTDB_HOST: questdb
      QUESTDB_REST_PORT: "9000"
      S3_BUCKET: "${S3_BUCKET:-wikistreams-datalake}"
      S3_PREFIX: "${S3_PREFIX:-events}"
      AWS_REGION: "${AWS_REGION:-ap-northeast-2}"
      AWS_ACCESS_KEY_ID: "${AWS_ACCESS_KEY_ID:-}"
      AWS_SECRET_ACCESS_KEY: "${AWS_SECRET_ACCESS_KEY:-}"
      S3_ENDPOINT_URL: "${S3_ENDPOINT_URL:-}"
      LOG_LEVEL: "INFO"
    profiles:
      - s3

  # 로컬 S3 호환 스토리지 (개발/테스트용)
  # 콘솔: http://localhost:9001  (admin / minioadmin)
  # API:  http://localhost:9100
  minio:
    image: minio/minio:latest
    container_name: minio
    ports:
      - "9100:9000"   # S3 API
      - "9101:9001"   # Web Console
    volumes:
      - minio_data:/data
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    command: server /data --console-address ":9001"
    restart: always
    profiles:
      - s3
