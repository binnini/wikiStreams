volumes:
  producer_cache: {}
  grafana_data: {}
  questdb_data: {}
  resource_monitor_data: {}
  loki_data: {}

services:
  loki:
    image: grafana/loki:3.0.0
    container_name: loki
    ports:
      - "3100:3100"
    volumes:
      - ./monitoring/loki-config.yaml:/etc/loki/local-config.yaml
      - loki_data:/loki
    command: -config.file=/etc/loki/local-config.yaml
    restart: always

  alloy:
    image: grafana/alloy:latest
    container_name: alloy
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./monitoring/alloy-config.alloy:/etc/alloy/config.alloy
    command: run /etc/alloy/config.alloy
    restart: always

  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    ports:
      - "3000:3000"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana-datasources.yaml:/etc/grafana/provisioning/datasources/datasources.yaml
      - ./monitoring/grafana-dashboards.yaml:/etc/grafana/provisioning/dashboards/dashboards.yaml
      - ./monitoring/grafana-contact-points.yaml:/etc/grafana/provisioning/alerting/contact-points.yaml
      - ./monitoring/grafana-notification-policy.yaml:/etc/grafana/provisioning/alerting/notification-policy.yaml
      - ./monitoring/grafana-alert-rules.yaml:/etc/grafana/provisioning/alerting/alert-rules.yaml
      - ./monitoring/dashboards:/var/lib/grafana/dashboards
    environment:
      - GF_AUTH_ANONYMOUS_ENABLED=true
      - GF_AUTH_ANONYMOUS_ORG_ROLE=Admin
      - DISCORD_WEBHOOK_URL=${DISCORD_WEBHOOK_URL}
    depends_on:
      - loki
    restart: always

  questdb:
    image: questdb/questdb:8.2.1
    container_name: questdb
    ports:
      - "9000:9000"   # REST API + Web Console
      - "8812:8812"   # PostgreSQL wire protocol (Grafana 연결)
    volumes:
      - questdb_data:/var/lib/questdb
    environment:
      QDB_CAIRO_MAX_UNCOMMITTED_ROWS: "1000"
      QDB_LINE_TCP_MAINTENANCE_JOB_INTERVAL: "5000"
    mem_limit: 1100m
    restart: always

  questdb-consumer:
    build: ./src/questdb_consumer
    container_name: questdb-consumer
    depends_on:
      - questdb
      - redpanda
    restart: on-failure
    environment:
      KAFKA_BROKER: "redpanda:9092"
      KAFKA_TOPIC: "wikimedia.recentchange"
      KAFKA_GROUP_ID: "questdb-consumer"
      QUESTDB_HOST: "questdb"
      QUESTDB_ILP_PORT: "9009"
      BATCH_SIZE: "500"
      BATCH_TIMEOUT_MS: "5000"
      LOG_LEVEL: "INFO"

  redpanda:
    image: redpandadata/redpanda:latest
    container_name: redpanda
    command:
      - redpanda
      - start
      - --kafka-addr internal://0.0.0.0:9092,external://0.0.0.0:19092
      - --advertise-kafka-addr internal://redpanda:9092,external://localhost:9092
      - --mode dev-container
      - --smp 1
      - --memory 512M
    ports:
      - "9092:19092"  # host:9092 → container external listener :19092
    restart: always

  producer:
    build: ./src/producer
    container_name: producer
    volumes:
      - producer_cache:/cache
    depends_on:
      - redpanda
    restart: on-failure
    environment:
      KAFKA_BROKER: 'redpanda:9092'
      KAFKA_TOPIC: 'wikimedia.recentchange'
      KAFKA_DLQ_TOPIC: 'wikimedia.recentchange.dlq'

  # dlq-consumer: 1단계 경량화 — 제거 (2026-03-07 스테이징 검증, 2026-03-08 운영 반영)
  # 제거 근거: _should_skip() 사전 필터로 log/canary 이벤트 드롭 → DLQ near-zero 확인

  resource-monitor:
    build: ./src/resource_monitor
    container_name: resource-monitor
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - resource_monitor_data:/data
    environment:
      MONITOR_TARGETS: 'producer,questdb'
      RESOURCE_MONITOR_DISCORD_WEBHOOK_URL: '${RESOURCE_MONITOR_DISCORD_WEBHOOK_URL}'
      BASELINE_DB_PATH: '/data/resource_monitor_baseline.db'
    restart: always

  reporter:
    build: ./src/reporter
    container_name: reporter
    depends_on:
      - questdb
    restart: always
    environment:
      QUESTDB_HOST: 'questdb'
      QUESTDB_PORT: '9000'
      ANTHROPIC_API_KEY: '${ANTHROPIC_API_KEY}'
      DISCORD_WEBHOOK_URL: '${DISCORD_WEBHOOK_URL}'
      REPORT_HOUR_KST: '9'
      REPORT_STORAGE_DIR: '/app/reports'
    volumes:
      - ./reports:/app/reports
