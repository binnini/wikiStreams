volumes:
  producer_cache: {}
  grafana_data: {}
  clickhouse_data: {}

services:
  loki:
    image: grafana/loki:3.0.0
    container_name: loki
    ports:
      - "3100:3100"
    volumes:
      - ./monitoring/loki-config.yaml:/etc/loki/local-config.yaml
    command: -config.file=/etc/loki/local-config.yaml
    restart: always

  alloy:
    image: grafana/alloy:latest
    container_name: alloy
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./monitoring/alloy-config.alloy:/etc/alloy/config.alloy
    command: run /etc/alloy/config.alloy
    restart: always

  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    ports:
      - "3000:3000"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana-datasources.yaml:/etc/grafana/provisioning/datasources/datasources.yaml
      - ./monitoring/grafana-dashboards.yaml:/etc/grafana/provisioning/dashboards/dashboards.yaml
      - ./monitoring/dashboards:/var/lib/grafana/dashboards
    environment:
      - GF_AUTH_ANONYMOUS_ENABLED=true
      - GF_AUTH_ANONYMOUS_ORG_ROLE=Admin
      - GF_INSTALL_PLUGINS=grafana-clickhouse-datasource
    depends_on:
      - loki
    restart: always

  clickhouse:
    image: clickhouse/clickhouse-server:25.8
    container_name: clickhouse
    ports:
      - "8123:8123"  # HTTP interface
      - "9000:9000"  # Native TCP
    volumes:
      - clickhouse_data:/var/lib/clickhouse
      - ./clickhouse/init-db.sql:/docker-entrypoint-initdb.d/init-db.sql
      - ./clickhouse/override-users.xml:/etc/clickhouse-server/users.d/override-users.xml
    depends_on:
      - kafka-kraft
    restart: always
    ulimits:
      nofile:
        soft: 262144
        hard: 262144

  kafka-kraft:
    image: confluentinc/cp-kafka:8.1.1
    container_name: kafka-kraft
    hostname: kafka-kraft
    ports:
      - "9092:9092"
      - "9101:9101" # JMX 모니터링 포트
    environment:
      # 노드 식별자
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: 'broker,controller'
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: 'CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT'
      KAFKA_LISTENERS: 'PLAINTEXT://kafka-kraft:29092,CONTROLLER://kafka-kraft:29093,PLAINTEXT_HOST://0.0.0.0:9092'
      KAFKA_ADVERTISED_LISTENERS: 'PLAINTEXT://kafka-kraft:29092,PLAINTEXT_HOST://localhost:9092'
      KAFKA_CONTROLLER_QUORUM_VOTERS: '1@kafka-kraft:29093'
      KAFKA_CONTROLLER_LISTENER_NAMES: 'CONTROLLER'
      KAFKA_INTER_BROKER_LISTENER_NAME: 'PLAINTEXT'
      CLUSTER_ID: 'mhOYs7esSROR35QrnFq1eA'
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_JMX_PORT: 9101
      KAFKA_JMX_HOSTNAME: localhost

  producer:
    build: ./src/producer
    container_name: producer
    volumes:
      - producer_cache:/cache
    depends_on:
      - kafka-kraft
    restart: on-failure
    environment:
      KAFKA_BROKER: 'kafka-kraft:29092'
      KAFKA_TOPIC: 'wikimedia.recentchange'
      KAFKA_DLQ_TOPIC: 'wikimedia.recentchange.dlq'

  dlq-consumer:
    build: ./src/dlq_consumer
    container_name: dlq-consumer
    depends_on:
      - kafka-kraft
    restart: on-failure
    environment:
      KAFKA_BROKER: 'kafka-kraft:29092'
      KAFKA_TOPIC: 'wikimedia.recentchange'
      KAFKA_DLQ_TOPIC: 'wikimedia.recentchange.dlq'
      DLQ_MAX_RETRIES: '3'

  docker-stats-logger:
    image: docker:cli
    container_name: docker-stats-logger
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./monitoring/collect_docker_stats.sh:/collect_docker_stats.sh
    entrypoint: ["/bin/sh", "/collect_docker_stats.sh"]
    restart: always

  reporter:
    build: ./src/reporter
    container_name: reporter
    depends_on:
      - clickhouse
    restart: always
    environment:
      CLICKHOUSE_HOST: 'clickhouse'
      CLICKHOUSE_PORT: '8123'
      ANTHROPIC_API_KEY: '${ANTHROPIC_API_KEY}'
      DISCORD_WEBHOOK_URL: '${DISCORD_WEBHOOK_URL}'
      REPORT_HOUR_KST: '9'
      REPORT_STORAGE_DIR: '/app/reports'
    volumes:
      - ./reports:/app/reports
