# Kafka KRaft 단일 노드 설정 (벤치마크용 참고)
# Docker에서는 docker-compose.kafka-bench.yml의 환경변수로 동일하게 적용됨

# KRaft 모드: broker + controller 겸용
process.roles=broker,controller
node.id=1
controller.quorum.voters=1@kafka-bench:29093

# 리스너
listeners=PLAINTEXT://0.0.0.0:29092,CONTROLLER://0.0.0.0:29093
advertised.listeners=PLAINTEXT://localhost:29092
listener.security.protocol.map=PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT
inter.broker.listener.name=PLAINTEXT
controller.listener.names=CONTROLLER

# 단일 노드
offsets.topic.replication.factor=1
transaction.state.log.replication.factor=1
transaction.state.log.min.isr=1
group.initial.rebalance.delay.ms=0

# 로그
log.dirs=/tmp/kraft-combined-logs

# t3.small 시뮬레이션: 힙 압박으로 GC 빈도 재현
# KAFKA_HEAP_OPTS="-Xms256m -Xmx512m"  (환경변수로 설정)
